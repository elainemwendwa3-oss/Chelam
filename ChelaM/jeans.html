<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chela Couture | Jeans Collection</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mobile-wrapper">
        
        <header class="home-header">
           <a href="pants.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <h2>Denim Edit</h2>
            <div class="cart-icon"><i class="fa-solid fa-bag-shopping"></i></div>
        </header>

        <div class="product-listing">
            <div class="item-card">
                <div class="img-box"><img src="jeans/bowjeans.jpg" alt="Bow Jeans"></div>
                <div class="item-details">
                    <h4>Bow Detail Jeans</h4>
                    <span class="price">Ksh 2,500</span>
                    <button class="add-to-cart">+</button>
                </div>
            </div>

            <div class="item-card">
                <div class="img-box"><img src="jeans/lightbluejeans.jpg" alt="Light Blue Jeans"></div>
                <div class="item-details">
                    <h4>Light Blue Classic</h4>
                    <span class="price">Ksh 2,200</span>
                    <button class="add-to-cart">+</button>
                </div>
            </div>

            <div class="item-card">
                <div class="img-box"><img src="jeans/raggedbluejeans.jpg" alt="Ragged Blue"></div>
                <div class="item-details">
                    <h4>Distressed Ragged Blue</h4>
                    <span class="price">Ksh 2,800</span>
                    <button class="add-to-cart">+</button>
                </div>
            </div>

            <div class="item-card">
                <div class="img-box"><img src="jeans/sidepocketjeans.jpg" alt="Side Pocket"></div>
                <div class="item-details">
                    <h4>Cargo Side Pocket</h4>
                    <span class="price">Ksh 3,000</span>
                    <button class="add-to-cart">+</button>
                </div>
            </div>

            <div class="item-card">
                <div class="img-box"><img src="jeans/Zaragreyjeans.jpg" alt="Zara Grey"></div>
                <div class="item-details">
                    <h4>Zara Edition Grey</h4>
                    <span class="price">Ksh 3,500</span>
                    <button class="add-to-cart">+</button>
                </div>
            </div>
        </div>
            <div class="cart-icon">
    <i class="fa-solid fa-bag-shopping"></i>
    <span class="badge" id="cart-count">0</span>
            </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
